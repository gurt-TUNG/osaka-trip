        function sanitizeExpenses(expensesList) {
            if (!Array.isArray(expensesList)) return [];
            expensesList.forEach(e => {
                if (e.twd === undefined) {
                    e.jpy = e.amount || 0;
                    e.twd = Math.round(e.jpy * EXCHANGE_RATE);
                    e.catId = e.catId || 'other';
                    e.formula = e.formula || String(e.jpy);
                    e.day = e.day || 1;
                }
                if (!e.currency) e.currency = 'JPY'; 
                if (!e.updatedAt) e.updatedAt = e.id; 
                if (e.deleted === undefined) e.deleted = false;
                if (e.verified === undefined) e.verified = false; 
            });
            return expensesList;
        }

        function sanitizePacking(packingList) {
             if (!Array.isArray(packingList)) return [];
             packingList.forEach(p => {
                 if (!p.updatedAt) p.updatedAt = p.id || Date.now();
                 if (p.deleted === undefined) p.deleted = false;
             });
             return packingList;
        }

        async function cloudSync(isManual = true) {
            if(isManual) showLoading(true, "正在與雲端雙向同步中...");
            try {
                document.getElementById('sync-status').innerText = "☁️ 同步中...";
                await performSync();
                document.getElementById('sync-status').innerText = "已於 " + new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'}) + " 同步";
                if(isManual) {
                    showLoading(false);
                    showAlert("同步成功", "資料已與雲端同步至最新狀態。", "success");
                }
            } catch (e) {
                console.log("同步失敗:", e);
                document.getElementById('sync-status').innerText = "⚠️ 離線模式 (同步失敗)";
                if(isManual) {
                    showLoading(false);
                    showAlert("同步失敗", "請檢查網路連線或 API 網址是否正確。", "error");
                }
            }
            render();
        }

        async function performSync() {
            try {
                const res = await fetch(API_URL);
                const result = await res.json();
                
                let cloudState = DEFAULT_STATE;
                if (result.status === "success" && result.data && result.data !== "{}") {
                    cloudState = JSON.parse(result.data);
                }

                let mergedState = { ...appState };
                
                if (cloudState.expenses) {
                    cloudState.expenses = sanitizeExpenses(cloudState.expenses);
                    cloudState.expenses.forEach(cEx => {
                        const mExIndex = mergedState.expenses.findIndex(m => m.id === cEx.id);
                        if (mExIndex === -1) {
                            mergedState.expenses.push(cEx);
                        } else {
                            const mEx = mergedState.expenses[mExIndex];
                            if (cEx.updatedAt > mEx.updatedAt) {
                                mergedState.expenses[mExIndex] = cEx; 
                            }
                        }
                    });
                    mergedState.expenses.sort((a, b) => b.id - a.id); 
                }

                if (cloudState.packing) {
                    cloudState.packing = sanitizePacking(cloudState.packing);
                    cloudState.packing.forEach(cPk => {
                        const mPkIndex = mergedState.packing.findIndex(p => p.id === cPk.id);
                        if (mPkIndex === -1) {
                            mergedState.packing.push(cPk);
                        } else {
                            const mPk = mergedState.packing[mPkIndex];
                            if (cPk.updatedAt > mPk.updatedAt) {
                                mergedState.packing[mPkIndex] = cPk;
                            }
                        }
                    });
                }

                mergedState.completedSpots = { ...cloudState.completedSpots, ...mergedState.completedSpots };
                mergedState.hiddenDays = { ...cloudState.hiddenDays, ...mergedState.hiddenDays };
                mergedState.autoHiddenProcessed = appState.autoHiddenProcessed;

                if (cloudState.customSpots) {
                    Object.keys(cloudState.customSpots).forEach(day => {
                        if (!mergedState.customSpots[day]) mergedState.customSpots[day] = [];
                        cloudState.customSpots[day].forEach(cSpot => {
                            const exists = mergedState.customSpots[day].some(mSpot => mSpot.id === cSpot.id);
                            if (!exists) mergedState.customSpots[day].push(cSpot);
                        });
                    });
                }

                appState = mergedState;
                saveState();

                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ data: JSON.stringify(appState) })
                });

            } catch (err) {
                throw err;
            }
        }

        function previewCalc() {
            const input = document.getElementById('ex-formula').value;
            const currency = document.getElementById('ex-currency').value;
            const withPlus = input.replace(/\s+/g, '+'); 
            const safeInput = withPlus.replace(/[^0-9+\-*/().]/g, '');
            try {
                if(safeInput && !safeInput.endsWith('+') && !safeInput.endsWith('-')) {
                    const amount = eval(safeInput);
                    if (currency === 'JPY') {
                        const twd = Math.round(amount * EXCHANGE_RATE);
                        document.getElementById('ex-preview').innerText = isNaN(twd) ? '' : `NT$ ${twd}`;
                    } else {

        function saveExpense() {
            const day = parseInt(document.getElementById('ex-day').value);
            const catId = document.getElementById('ex-cat').value;
            const currency = document.getElementById('ex-currency').value;
            const desc = document.getElementById('ex-desc').value.trim() || '未命名項目';
            const rawFormula = document.getElementById('ex-formula').value;
            const withPlus = rawFormula.replace(/\s+/g, '+');
            const formula = withPlus.replace(/[^0-9+\-*/().]/g, '');
            
            if(!formula) {
                showAlert("輸入不完整", "請輸入金額或算式！", "info");
                return;
            }
            
            try {
                const amount = eval(formula);
                if(isNaN(amount) || amount <= 0) throw new Error();
                
                let jpy, twd;
                if (currency === 'JPY') {
                    jpy = Math.floor(amount);
                    twd = Math.round(jpy * EXCHANGE_RATE);
                } else {
                    twd = Math.round(amount);
                    jpy = Math.floor(twd / EXCHANGE_RATE);
                }
                
                if (editingExpenseId) {
                    const index = appState.expenses.findIndex(e => e.id === editingExpenseId);
                    if (index !== -1) {
                        appState.expenses[index] = {
                            ...appState.expenses[index],
                            day, catId, currency, desc, formula: rawFormula, jpy, twd,
                            updatedAt: Date.now() 
                            // 編輯時保持原有的 verified 狀態不變
                        };
                    }
                    editingExpenseId = null;
                } else {
                    const now = Date.now();
                    appState.expenses.unshift({
                        id: now, updatedAt: now, deleted: false, verified: false,
                        day, catId, currency, desc, formula: rawFormula, jpy, twd,
                        time: new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'})
                    });
                }
                
                render();
                cloudSync(false);
            } catch(e) {
                showAlert("格式錯誤", "算式有誤，請檢查輸入的內容！", "error");
            }
        }

        // --- 🔥 匯入 Excel 並覆蓋 (使用 SheetJS) ---
        function handleExcelUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (confirm("⚠️ 警告：匯入 Excel 將會覆蓋目前手機上的記帳紀錄。\n\n確認您已經編輯好檔案了嗎？確定要繼續嗎？")) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, {type: 'array'});
                        const firstSheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[firstSheetName];
                        // 轉換為二維陣列 (Array of arrays) 以便解析
                        const rows = XLSX.utils.sheet_to_json(worksheet, {header: 1}); 
                        processExcelImport(rows);
                    } catch(err) {
                        console.error(err);
                        showAlert("讀取失敗", "無法解析此 Excel 檔案，請確認格式正確。", "error");
                    }
                };
                reader.readAsArrayBuffer(file);
            }
            event.target.value = ''; // 重置 input
        }

        function processExcelImport(rows) {
            try {
                if (rows.length <= 1) {
                    showAlert("匯入失敗", "檔案無效或沒有資料列。", "error");
                    return;
                }

                const newExpenses = [];
                const now = Date.now();
                const importedIds = new Set(); // 記錄 Excel 中存在的 ID

                // 跳過表頭，從第二行開始
                for (let i = 1; i < rows.length; i++) {
                    let row = rows[i];
                    // 略過空行
                    if (!row || row.length === 0 || (!row[2] && !row[3] && !row[4])) continue; 
                    
                    let dayStr = String(row[0] || '');
                    let catStr = String(row[1] || '');
                    let desc = String(row[2] || '未命名');
                    let jpy = parseInt(row[3]) || 0;
                    let twd = parseInt(row[4]) || 0;
                    let time = String(row[5] || new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'}));
                    let verifiedStr = String(row[6] || '');
                    let verified = (verifiedStr.toUpperCase() === 'V');
                    let existingId = row[7] ? parseInt(row[7]) : null;

                    // 如果只有填日幣沒填台幣，自動換算台幣
                    if (jpy > 0 && twd === 0) {
                        twd = Math.round(jpy * EXCHANGE_RATE);
                    } 
                    // 如果只有填台幣沒填日幣，自動換算日幣
                    else if (twd > 0 && jpy === 0) {
                        jpy = Math.floor(twd / EXCHANGE_RATE);
                    }

                    // 還原天數
                    let day = 1;
                    if (dayStr.includes('行前') || dayStr === '0') day = 0;
                    else {
                        const m = dayStr.match(/\d+/);
                        if (m) day = parseInt(m[0]);
                    }

                    // 還原分類
                    let catId = 'other';
                    const catObj = EXPENSE_CATEGORIES.find(c => c.label === catStr);
                    if (catObj) catId = catObj.id;

                    // 決定 ID
                    let idToUse = existingId ? existingId : (now - i * 1000);
                    importedIds.add(idToUse);

                    // 尋找現有紀錄
                    let existingExp = appState.expenses.find(e => e.id === idToUse);
                    if (existingExp) {
                        existingExp.day = day;
                        existingExp.catId = catId;
                        existingExp.desc = desc;
                        existingExp.jpy = jpy;
                        existingExp.twd = twd;
                        existingExp.formula = String(jpy);
                        existingExp.time = time;
                        existingExp.verified = verified;
                        existingExp.updatedAt = now;
                        existingExp.deleted = false;
                    } else {
                        appState.expenses.push({
                            id: idToUse,
                            updatedAt: now,
                            deleted: false,
                            verified: verified,
                            day: day,
                            catId: catId,
                            currency: 'JPY', 
                            desc: desc,
                            formula: String(jpy),
                            jpy: jpy,
                            twd: twd,
                            time: time
                        });
                    }
                }

                // 將原本在手機裡，但在 Excel 中被刪掉（或沒有 ID）的項目標記為已刪除
                appState.expenses.forEach(e => {
                    if (!importedIds.has(e.id) && !e.deleted) {
                        e.deleted = true;
                        e.updatedAt = now;
                    }
                });

                saveState();
                render();
                cloudSync(false); // 背景同步上傳新資料
                showAlert("匯入成功", `已成功同步 Excel 資料！`, "success");

            } catch (e) {
                console.error(e);
                showAlert("匯入失敗", "處理檔案時發生錯誤，請確保「系統ID」欄位未被破壞。", "error");
            }
        }

                </div>
            `;
        }

        function speak(text) {
            if (!window.speechSynthesis) {
                showAlert("語音錯誤", "您的瀏覽器不支援語音功能", "error");
                return;
            }
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'ja-JP'; u.rate = 0.85; u.pitch = 1.1;
            window.speechSynthesis.speak(u);
        }
    </script>
</body>
</html>
