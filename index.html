<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大阪親子7日遊</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="大阪旅遊">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/7893/7893979.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f9fafb; 
            padding-bottom: 90px;
            -webkit-tap-highlight-color: transparent;
        }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .pt-safe { padding-top: env(safe-area-inset-top); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Modal 樣式 */
        #modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); z-index: 100;
            display: none; justify-content: center; align-items: center; padding: 20px;
        }
        #modal-content {
            background: white; padding: 20px; border-radius: 16px; width: 100%; max-width: 400px;
            max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>

    <header class="bg-blue-600 text-white p-4 shadow-lg sticky top-0 z-50 pt-safe">
        <div class="max-w-md mx-auto flex justify-between items-center pt-2">
            <div>
                <h1 class="text-xl font-bold">大阪親子 7 日遊</h1>
                <p class="text-xs text-blue-200">2026/04/18 - 04/24 • 2大2小</p>
            </div>
            <div class="bg-blue-700 p-2 rounded-full shadow-inner">
                <i data-lucide="plane" class="w-5 h-5"></i>
            </div>
        </div>
    </header>

    <main id="app-content" class="max-w-md mx-auto p-4 min-h-screen"></main>

    <!-- 底部導航列 (新增 SOS) -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] z-40 pb-safe">
        <div class="max-w-md mx-auto flex justify-around items-center h-16 pb-1 px-1">
            <button onclick="switchTab('itinerary')" class="nav-btn flex flex-col items-center justify-center w-full h-full space-y-1 text-gray-400" id="btn-itinerary">
                <i data-lucide="home" class="w-6 h-6"></i><span class="text-[10px] font-medium">行程</span>
            </button>
            <button onclick="switchTab('tools')" class="nav-btn flex flex-col items-center justify-center w-full h-full space-y-1 text-gray-400" id="btn-tools">
                <i data-lucide="calculator" class="w-6 h-6"></i><span class="text-[10px] font-medium">記帳工具</span>
            </button>
            <button onclick="switchTab('learning')" class="nav-btn flex flex-col items-center justify-center w-full h-full space-y-1 text-gray-400" id="btn-learning">
                <i data-lucide="book-open" class="w-6 h-6"></i><span class="text-[10px] font-medium">日語</span>
            </button>
            <button onclick="switchTab('packing')" class="nav-btn flex flex-col items-center justify-center w-full h-full space-y-1 text-gray-400" id="btn-packing">
                <i data-lucide="list-checks" class="w-6 h-6"></i><span class="text-[10px] font-medium">清單</span>
            </button>
            <button onclick="switchTab('sos')" class="nav-btn flex flex-col items-center justify-center w-full h-full space-y-1 text-gray-400" id="btn-sos">
                <i data-lucide="life-buoy" class="w-6 h-6 text-red-500"></i><span class="text-[10px] font-medium text-red-600">救援</span>
            </button>
        </div>
    </nav>

    <!-- Modal 彈出視窗 -->
    <div id="modal-overlay" onclick="if(event.target === this) closeModal()">
        <div id="modal-content" class="relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-800 bg-gray-100 rounded-full p-1"><i data-lucide="x" class="w-5 h-5"></i></button>
            <h3 id="modal-title" class="text-xl font-bold text-gray-800 mb-2 pr-8"></h3>
            <div id="modal-body" class="mb-4"></div>
            <div id="modal-actions" class="flex gap-2 mt-4"></div>
        </div>
    </div>

    <script>
        // --- 常數與資料庫 ---
        const HOTEL_ADDRESS = "大阪市西成区北開一丁目1番27号";
        const EXCHANGE_RATE = 0.21; // 日幣轉台幣預估匯率
        
        const ITINERARY_DATA = [
            {
                day: 1, date: "4/18 (六)", title: "抵達神戶 ➡️ 道頓堀", intensity: 5, location: "Dotonbori", displayLoc: "神戶機場 -> 大阪市區",
                desc: "10:30 抵達神戶機場 (UKB)，搭乘 Port Liner 轉車前往大阪市區 Check-in。晚上前往道頓堀感受大阪熱鬧氣氛。",
                meals: { b: "機上", l: "市區簡餐", d: "道頓堀/心齋橋商圈" },
                baseSpots: ["神戶機場 (UKB)", "道頓堀/心齋橋", "跑跑人看板"]
            },
            {
                day: 2, date: "4/19 (日)", title: "天王寺動物園 ➡️ 新世界", intensity: 6, location: "Tennoji Zoo", displayLoc: "天王寺 / 阿倍野",
                desc: "輕鬆看動物，出園直接去新世界吃炸串，傍晚看通天閣或阿倍野夜景。",
                meals: { b: "飯店/超商", l: "新世界串炸 (無辣全熟)", d: "阿倍野周邊" },
                baseSpots: ["天王寺動物園", "新世界老街", "通天閣", "阿倍野 HARUKAS"]
            },
            {
                day: 3, date: "4/20 (一)", title: "京都清水寺 ➡️ 老街", intensity: 7, location: "Kiyomizu-dera", displayLoc: "京都清水寺",
                desc: "唯一跨縣市移動。清水寺及周邊老街漫步，體驗傳統日本風情。",
                meals: { b: "超商", l: "京都湯豆腐/烏龍麵", d: "大阪市區迴轉壽司" },
                baseSpots: ["清水寺", "二年坂 / 三年坂", "八坂神社"]
            },
            {
                day: 4, date: "4/21 (二)", title: "🔥 環球影城 USJ", intensity: 10, location: "Universal Studios Japan", displayLoc: "USJ 環球影城",
                desc: "避開週一！全日戰鬥行程。超級任天堂世界主場，早出晚歸。",
                meals: { b: "便利商店飯糰", l: "園區輕食", d: "超商炸雞/便當" },
                baseSpots: ["超級任天堂世界", "小小兵樂園", "環球奇境"]
            },
            {
                day: 5, date: "4/22 (三)", title: "任天堂官方店 ➡️ 梅田", intensity: 4, location: "Daimaru Umeda", displayLoc: "大阪梅田商圈",
                desc: "USJ 隔日體力恢復。主攻大丸梅田 13F 的任天堂與寶可夢中心。",
                meals: { b: "飯店", l: "大丸百貨美食街", d: "梅田周邊燒肉/壽喜燒" },
                baseSpots: ["Nintendo OSAKA", "寶可夢中心", "梅田商圈"]
            },
            {
                day: 6, date: "4/23 (四)", title: "海遊館 ➡️ 天保山", intensity: 6, location: "Osaka Aquarium Kaiyukan", displayLoc: "大阪港灣區",
                desc: "港灣區看鯨鯊。下坡好走，下午搭摩天輪。",
                meals: { b: "超商", l: "天保山大阪燒", d: "市區簡餐" },
                baseSpots: ["海遊館 (鯨鯊)", "天保山摩天輪", "聖瑪麗亞號"]
            },
            {
                day: 7, date: "4/24 (五)", title: "最後採買 ➡️ 返台", intensity: 5, location: "Rinku Premium Outlets", displayLoc: "市區 / 關西機場",
                desc: "最後藥妝補貨或臨空城 Outlet。準備搭乘 20:55 班機返台。",
                meals: { b: "退房", l: "市區/Outlet 美食", d: "關西機場" },
                baseSpots: ["臨空城 Outlet", "關西機場"]
            }
        ];

        // 景點深度介紹資料庫
        const SPOT_DETAILS = {
            "道頓堀/心齋橋": { desc: "大阪最熱鬧的美食與購物商圈。這裡有著名的巨大立體招牌（螃蟹、章魚等），非常吸引小朋友目光。人潮擁擠，請務必牽好小朋友的手。", img: "" },
            "跑跑人看板": { desc: "固力果(Glico)跑跑人是大阪最具代表性的打卡地標，位於戎橋旁。晚上點燈後非常漂亮。", img: "" },
            "天王寺動物園": { desc: "擁有超過百年歷史的市區動物園。佔地不大，地勢平坦，小朋友走起來不費力。可以看到河馬、獅子等受歡迎的動物。", img: "" },
            "新世界老街": { desc: "充滿昭和時代復古風情的老街，是大阪「串炸」的發源地。串炸多為熟食，沾醬甜甜的，小朋友通常接受度很高。", img: "" },
            "清水寺": { desc: "京都最著名的木造寺廟，擁有懸空的「清水舞台」。前往寺廟有一段上坡路（松原通），建議慢慢走，沿途有很多試吃可以安撫小孩。", img: "" },
            "超級任天堂世界": { desc: "USJ最受歡迎的園區！建議購買「能量手環」，小朋友可以在園區內敲擊問號磚塊收集金幣，互動性極佳。（注意：瑪利歐賽車需滿107cm）", img: "" },
            "Nintendo OSAKA": { desc: "位於大丸梅田百貨13樓的任天堂官方直營店！販售獨家周邊商品，旁邊就是巨大的 Pokémon Center，是小朋友的購物天堂。", img: "" },
            "海遊館 (鯨鯊)": { desc: "世界最大級的水族館之一。最大特色是設計成「螺旋狀緩坡」，搭電梯到頂樓後一路往下走，不需爬樓梯，對家庭客極度友善。巨大的鯨鯊是必看重點。", img: "" },
            "關西機場": { desc: "回程航班為 20:55，建議於 18:30 前抵達機場辦理報到與托運行李，並預留時間進行安檢。", img: "" }
        };

        const EXPENSE_CATEGORIES = [
            { id: 'food', icon: '🍔', label: '飲食', color: '#f97316' }, // orange
            { id: 'shopping', icon: '🛍️', label: '購物', color: '#a855f7' }, // purple
            { id: 'transport', icon: '🚃', label: '交通', color: '#3b82f6' }, // blue
            { id: 'ticket', icon: '🎟️', label: '門票', color: '#ef4444' }, // red
            { id: 'other', icon: '📦', label: '其他', color: '#9ca3af' }  // gray
        ];

        // --- APP 狀態中心 ---
        const DEFAULT_STATE = {
            expenses: [], 
            packing: [
                { id: 1, text: "下載 USJ 官方 APP", checked: true },
                { id: 2, text: "準備 100 圓硬幣", checked: true },
                { id: 3, text: "確認漫遊網卡/WiFi機", checked: false },
                { id: 4, text: "護照 (有效期6個月以上)", checked: false },
                { id: 5, text: "兒童輕便雨衣", checked: false },
                { id: 6, text: "常用藥品 (退燒/腸胃)", checked: false }
            ],
            customSpots: {},
            completedSpots: {},
            hiddenDays: {}
        };

        let appState = JSON.parse(localStorage.getItem('osaka_app_state')) || DEFAULT_STATE;
        if(!appState.expenses) appState.expenses = [];
        if(!appState.packing) appState.packing = DEFAULT_STATE.packing;
        if(!appState.customSpots) appState.customSpots = {};
        if(!appState.completedSpots) appState.completedSpots = {};
        if(!appState.hiddenDays) appState.hiddenDays = {};

        function saveState() { localStorage.setItem('osaka_app_state', JSON.stringify(appState)); }

        let currentTab = 'itinerary';
        let expandedDay = 1;
        let childHeight = 100;
        let expandedSOS = null; // 用於紀錄哪一個 SOS 卡片被展開

        // --- 初始化 ---
        document.addEventListener('DOMContentLoaded', () => { render(); });

        function render() {
            const content = document.getElementById('app-content');
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                const isActive = btn.id === `btn-${currentTab}`;
                btn.className = `nav-btn flex flex-col items-center justify-center w-full h-full space-y-1 transition-colors ${isActive ? 'text-blue-600' : 'text-gray-400'}`;
                if(btn.id === 'btn-sos' && isActive) btn.className = `nav-btn flex flex-col items-center justify-center w-full h-full space-y-1 transition-colors text-red-600`;
            });

            if (currentTab === 'itinerary') renderItinerary(content);
            else if (currentTab === 'tools') renderTools(content);
            else if (currentTab === 'learning') renderLearning(content);
            else if (currentTab === 'packing') renderPacking(content);
            else if (currentTab === 'sos') renderSOS(content);

            lucide.createIcons();
            saveState();
        }

        function switchTab(tab) { currentTab = tab; render(); }
        function getMapLink(keyword) { return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(keyword)}`; }

        // --- 1. 行程表 ---
        function renderItinerary(container) {
            let html = `<div class="space-y-4 fade-in pt-2">`;

            ITINERARY_DATA.forEach(day => {
                const isHidden = appState.hiddenDays[day.day];
                const isExpanded = expandedDay === day.day && !isHidden;
                
                if (isHidden) {
                    html += `
                        <div class="bg-gray-100 rounded-xl p-3 flex justify-between items-center opacity-70 border border-gray-200">
                            <span class="text-sm font-bold text-gray-500">Day ${day.day} - 已隱藏</span>
                            <button onclick="toggleHideDay(${day.day})" class="text-xs text-blue-600 border border-blue-600 px-3 py-1.5 rounded-md bg-white font-bold">顯示行程</button>
                        </div>
                    `;
                    return;
                }

                const intensityColor = day.intensity >= 8 ? "bg-red-100 text-red-800" : (day.intensity >= 5 ? "bg-yellow-100 text-yellow-800" : "bg-green-100 text-green-800");
                const intensityLabel = day.intensity >= 8 ? "高強度" : (day.intensity >= 5 ? "中等" : "輕鬆");
                
                const custom = appState.customSpots[day.day] || [];
                let spotsHtml = '';
                
                day.baseSpots.forEach(s => {
                    const spotKey = `${day.day}-${s}`;
                    const isCompleted = appState.completedSpots[spotKey];
                    const hasInfo = SPOT_DETAILS[s] ? true : false;
                    
                    spotsHtml += `
                        <div class="flex items-center justify-between gap-2 mb-2 p-2.5 bg-blue-50 rounded-xl border border-blue-100 shadow-sm">
                            <div class="flex items-center gap-3 flex-1 cursor-pointer" onclick="toggleCompleteSpot('${spotKey}')">
                                <input type="checkbox" ${isCompleted ? 'checked' : ''} class="w-5 h-5 accent-blue-600 pointer-events-none rounded">
                                <span class="text-base flex-1 ${isCompleted ? 'line-through text-gray-400' : 'text-blue-900 font-bold'}">${s}</span>
                            </div>
                            <div class="flex gap-1">
                                ${hasInfo ? `<button onclick="showSpotInfo('${s}')" class="p-1.5 bg-blue-100 rounded-md text-blue-600 hover:bg-blue-200 flex items-center gap-1 text-xs font-bold"><i data-lucide="info" class="w-4 h-4"></i> 介紹</button>` : ''}
                                <a href="${getMapLink(s + ' 大阪')}" target="_blank" class="p-1.5 bg-white rounded-md border border-blue-200 text-blue-600 hover:bg-blue-100 flex items-center gap-1 text-xs font-bold"><i data-lucide="map" class="w-4 h-4"></i> 地圖</a>
                            </div>
                        </div>
                    `;
                });
                
                custom.forEach(cs => {
                    const spotKey = `custom-${cs.id}`;
                    const isCompleted = appState.completedSpots[spotKey];
                    spotsHtml += `
                        <div class="flex items-center justify-between gap-2 mb-2 p-2.5 bg-purple-50 rounded-xl border border-purple-100 shadow-sm">
                            <div class="flex items-center gap-3 flex-1 cursor-pointer" onclick="toggleCompleteSpot('${spotKey}')">
                                <input type="checkbox" ${isCompleted ? 'checked' : ''} class="w-5 h-5 accent-purple-600 pointer-events-none rounded">
                                <span class="text-base flex-1 ${isCompleted ? 'line-through text-gray-400' : 'text-purple-900 font-bold'}">${cs.text}</span>
                            </div>
                            <div class="flex gap-1">
                                <a href="${getMapLink(cs.text + ' 大阪')}" target="_blank" class="p-1.5 bg-white rounded-md border border-purple-200 text-purple-600 hover:bg-purple-100 flex items-center gap-1 text-xs font-bold"><i data-lucide="map" class="w-4 h-4"></i></a>
                                <button onclick="deleteCustomSpot(${day.day}, ${cs.id})" class="p-1.5 bg-red-50 rounded-md border border-red-200 text-red-500 hover:bg-red-100"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                    `;
                });

                html += `
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden transition-all duration-300 ${isExpanded ? 'ring-2 ring-blue-500' : ''}">
                        <div class="p-4 flex items-center justify-between cursor-pointer bg-white" onclick="toggleDay(${day.day})">
                            <div class="flex items-center gap-3">
                                <div class="flex flex-col items-center justify-center w-12 h-12 bg-gray-100 rounded-xl text-gray-600 font-bold">
                                    <span class="text-[10px] uppercase tracking-wider">Day</span>
                                    <span class="text-xl">${day.day}</span>
                                </div>
                                <div>
                                    <div class="text-xs text-gray-500 mb-0.5">${day.date}</div>
                                    <h3 class="text-lg font-extrabold text-gray-800 leading-tight">${day.title}</h3>
                                </div>
                            </div>
                            <span class="px-2.5 py-1 rounded-full text-xs font-bold shadow-sm ${intensityColor}">${intensityLabel}</span>
                        </div>
                        
                        ${isExpanded ? `
                        <div class="p-4 pt-2 border-t border-gray-100 bg-gray-50/30">
                            <div class="flex justify-end mb-3">
                                <button onclick="toggleHideDay(${day.day})" class="text-xs text-gray-500 hover:text-gray-800 flex items-center gap-1 bg-white border border-gray-200 px-3 py-1.5 rounded-lg shadow-sm"><i data-lucide="eye-off" class="w-4 h-4"></i> 隱藏此日行程</button>
                            </div>
                            <p class="text-gray-600 text-sm leading-relaxed mb-4">${day.desc}</p>
                            
                            <div class="mb-5">
                                <h4 class="text-xs font-bold text-gray-400 mb-2 uppercase tracking-wider">行程地標 (點擊打勾完成)</h4>
                                ${spotsHtml}
                                
                                <!-- 固定住宿點 -->
                                <div class="flex items-center justify-between gap-2 mt-3 mb-2 p-2.5 bg-indigo-50 rounded-xl border border-indigo-200 shadow-sm">
                                    <div class="flex items-center gap-2 flex-1">
                                        <i data-lucide="moon" class="w-5 h-5 text-indigo-500"></i>
                                        <span class="text-sm text-indigo-900 font-bold">返回飯店休息</span>
                                    </div>
                                    <a href="${getMapLink(HOTEL_ADDRESS)}" target="_blank" class="p-2 bg-indigo-600 rounded-lg text-white hover:bg-indigo-700 text-xs font-bold flex items-center gap-1 shadow">
                                        🗺️ 導航回飯店
                                    </a>
                                </div>

                                <div class="flex gap-2 mt-3">
                                    <input type="text" id="add-spot-${day.day}" placeholder="臨時加行程..." class="flex-1 border border-gray-300 p-2.5 text-sm rounded-lg bg-white shadow-inner">
                                    <button onclick="addCustomSpot(${day.day})" class="bg-gray-800 text-white px-5 py-2.5 rounded-lg text-sm font-bold whitespace-nowrap shadow hover:bg-black transition-colors">新增</button>
                                </div>
                            </div>

                            <div class="bg-orange-50 p-4 rounded-xl border border-orange-100 shadow-sm">
                                <h4 class="text-xs font-bold text-orange-800 mb-3 flex items-center gap-1 uppercase tracking-wider"><i data-lucide="utensils" class="w-4 h-4"></i> 餐食規劃</h4>
                                <div class="grid grid-cols-1 gap-2.5 text-sm text-gray-800">
                                    <div class="flex items-center gap-2"><span class="bg-orange-200 text-orange-800 px-2 py-0.5 rounded text-xs font-bold w-8 text-center">早</span> <span class="font-medium">${day.meals.b}</span></div>
                                    <div class="flex items-center gap-2"><span class="bg-orange-200 text-orange-800 px-2 py-0.5 rounded text-xs font-bold w-8 text-center">午</span> <span class="font-medium">${day.meals.l}</span></div>
                                    <div class="flex items-center gap-2"><span class="bg-orange-200 text-orange-800 px-2 py-0.5 rounded text-xs font-bold w-8 text-center">晚</span> <span class="font-medium">${day.meals.d}</span></div>
                                </div>
                            </div>
                        </div>` : ''}
                    </div>
                `;
            });
            
            html += `</div>`;
            container.innerHTML = html;
        }

        // 記帳運算邏輯 (加入空格轉換 +)
        function previewCalc() {
            const input = document.getElementById('ex-formula').value;
            const withPlus = input.replace(/\s+/g, '+'); // 空格轉換為加號
            const safeInput = withPlus.replace(/[^0-9+\-*/().]/g, '');
            try {
                if(safeInput && !safeInput.endsWith('+') && !safeInput.endsWith('-')) {
                    const jpy = Math.floor(eval(safeInput));
                    const twd = Math.round(jpy * EXCHANGE_RATE);
                    document.getElementById('ex-preview').innerText = isNaN(twd) ? '' : `NT$ ${twd}`;
                } else { document.getElementById('ex-preview').innerText = ''; }
            } catch(e) { document.getElementById('ex-preview').innerText = ''; }
        }

        function saveExpense() {
            const day = parseInt(document.getElementById('ex-day').value);
            const catId = document.getElementById('ex-cat').value;
            const desc = document.getElementById('ex-desc').value.trim() || '未命名項目';
            const rawFormula = document.getElementById('ex-formula').value;
            const withPlus = rawFormula.replace(/\s+/g, '+');
            const formula = withPlus.replace(/[^0-9+\-*/().]/g, '');
            
            if(!formula) return alert("請輸入金額或算式！");
            
            try {
                const jpy = Math.floor(eval(formula));
                if(isNaN(jpy) || jpy <= 0) throw new Error();
                const twd = Math.round(jpy * EXCHANGE_RATE);
                
                appState.expenses.unshift({
                    id: Date.now(), day, catId, desc, formula: rawFormula, jpy, twd,
                    time: new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'})
                });
                render();
            } catch(e) {
                alert("算式錯誤，請檢查輸入！");
            }
        }

        function showImportModal() {
            showModal(
                "📥 貼上同步碼",
                "請將家人傳給您的代碼貼在下方。建議使用【智慧合併】，系統會自動略過重複的記帳與清單項目。",
                "", true,

            );
        }

        function processImport(overwrite) {
            const code = document.getElementById('modal-textarea').value.trim();
            if (!code) return alert("請先貼上代碼！");
            try {
                const inc = JSON.parse(decodeURIComponent(atob(code)));
                if (!inc || typeof inc !== 'object') throw new Error();
                if (overwrite) {
                    if(confirm("確定覆蓋嗎？原本的資料會消失！")) { appState = inc; } else { return; }
                } else {
                    if (inc.expenses) {
                        inc.expenses.forEach(iEx => {
                            const exists = appState.expenses.some(mEx => mEx.desc === iEx.desc && mEx.amount === iEx.amount && mEx.time === iEx.time);
                            if (!exists) appState.expenses.push(iEx);
                        });
                        appState.expenses.sort((a, b) => b.id - a.id);
                    }
                    if (inc.packing) {
                        inc.packing.forEach(iPk => {
                            const mPk = appState.packing.find(p => p.text === iPk.text);
                            if (mPk) mPk.checked = mPk.checked || iPk.checked;
                            else appState.packing.push(iPk);
                        });
                    }
                    appState.completedSpots = { ...appState.completedSpots, ...(inc.completedSpots || {}) };
                    appState.hiddenDays = { ...appState.hiddenDays, ...(inc.hiddenDays || {}) };
                    if (inc.customSpots) {
                         Object.keys(inc.customSpots).forEach(day => {
                             if(!appState.customSpots[day]) appState.customSpots[day] = [];
                             inc.customSpots[day].forEach(iSpot => {
                                 const exists = appState.customSpots[day].some(mSpot => mSpot.text === iSpot.text);
                                 if(!exists) appState.customSpots[day].push(iSpot);
                             });
                         });
                    }
                }
                alert("🎉 同步成功！"); closeModal(); render();
            } catch(e) { alert("❌ 同步碼無效！"); }
        }

                { label: "附近醫院", query: "病院", icon: "🏥", color: "bg-red-50 text-red-700 border-red-200 hover:bg-red-100" },
                { label: "附近警察局", query: "交番", icon: "👮", color: "bg-blue-50 text-blue-700 border-blue-200 hover:bg-blue-100" },
                { label: "附近藥局", query: "薬局", icon: "💊", color: "bg-green-50 text-green-700 border-green-200 hover:bg-green-100" }
            ].map(b => `
                <a href="${getMapLink(b.query)}" target="_blank" class="flex flex-col items-center justify-center p-4 border rounded-2xl shadow-sm transition-colors ${b.color}">
                    <span class="text-3xl mb-1">${b.icon}</span>
                    <span class="text-sm font-bold">${b.label}</span>
                </a>
            `).join('');

            const phraseCards = SOS_PHRASES.map(p => {
                const isExpanded = expandedSOS === p.id;
                let subHtml = '';
                
                if (isExpanded && p.sub && p.sub.length > 0) {
                    subHtml = `
                        <div class="mt-4 pt-4 border-t border-red-100 space-y-2">
                            <p class="text-[10px] font-bold text-red-400 mb-2 uppercase tracking-widest flex items-center gap-1"><i data-lucide="corner-down-right" class="w-3 h-3"></i> 補充說明 (點擊發音)</p>
                            ${p.sub.map(sub => `
                                <div onclick="speak('${sub.jp}'); event.stopPropagation();" class="p-3 bg-red-50 rounded-xl flex justify-between items-center hover:bg-red-100 transition-colors shadow-sm">
                                    <div>
                                        <div class="text-sm font-bold text-gray-800">${sub.ch}</div>
                                        <div class="text-[10px] text-gray-500 font-mono mb-1">${sub.en}</div>
                                        <div class="text-sm font-bold text-red-600">${sub.jp}</div>
                                    </div>
                                    <div class="p-2 bg-white rounded-full shadow-sm text-red-400"><i data-lucide="volume-2" class="w-4 h-4"></i></div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }

                return `
                    <div onclick="toggleSOS(${p.id})" class="bg-white p-5 rounded-2xl border border-red-100 shadow-sm transition-all cursor-pointer relative group ${isExpanded ? 'ring-2 ring-red-400 bg-red-50/10' : ''}">
                        <div class="flex justify-between items-start">
                            <div class="pr-6">
                                <div class="text-lg font-bold text-gray-800">${p.ch}</div>
                                <div class="text-xs text-gray-500 mt-1 mb-3 font-mono">${p.en}</div>
                                <div class="text-lg font-bold text-red-600 flex items-center gap-2" onclick="speak('${p.jp}'); event.stopPropagation();">
                                    ${p.jp} <div class="p-1.5 bg-red-100 rounded-full text-red-500 hover:bg-red-200 shadow-sm"><i data-lucide="volume-2" class="w-4 h-4"></i></div>
                                </div>
                                <div class="text-xs text-red-400 font-medium mt-1">${p.romaji}</div>
                            </div>
                            ${p.sub && p.sub.length > 0 ? `<i data-lucide="${isExpanded ? 'chevron-up' : 'chevron-down'}" class="w-6 h-6 text-gray-400 flex-shrink-0 mt-1"></i>` : ''}
                        </div>
                        ${subHtml}
                    </div>
                `;
            }).join('');

            container.innerHTML = `
                <div class="space-y-6 fade-in pt-2">
                    <div class="bg-red-600 p-6 rounded-2xl shadow-lg text-white">
                        <div class="flex items-center gap-2 mb-4">
                            <i data-lucide="life-buoy" class="w-8 h-8"></i>
                            <h2 class="text-2xl font-black tracking-wider">緊急救援 SOS</h2>
                        </div>
                        <p class="text-sm text-red-100 mb-4 leading-relaxed">遇到突發狀況請保持冷靜。點擊下方按鈕尋找資源，或點擊求助卡片讓手機替您發聲發音。</p>
                        
                        <div class="grid grid-cols-2 gap-3 mb-4">
                            <a href="tel:119" class="bg-white text-red-600 font-black py-3 rounded-xl flex justify-center items-center gap-2 shadow-md">
                                <i data-lucide="phone" class="w-5 h-5"></i> 撥打 119 (救護車)
                            </a>
                            <a href="tel:110" class="bg-white text-blue-600 font-black py-3 rounded-xl flex justify-center items-center gap-2 shadow-md">
                                <i data-lucide="phone" class="w-5 h-5"></i> 撥打 110 (報警)
                            </a>
                        </div>
                        <p class="text-[10px] text-center text-red-200">※ 日本緊急電話可直撥。若使用漫遊請確認電信商設定。</p>
                    </div>

                    <div>
                        <h3 class="text-sm font-bold text-gray-500 mb-3 pl-1 uppercase tracking-widest">📍 一鍵地圖搜尋</h3>
                        <div class="grid grid-cols-3 gap-2">
                            ${mapBtns}
                        </div>
                    </div>

                    <div>
                        <h3 class="text-sm font-bold text-gray-500 mb-3 pl-1 uppercase tracking-widest">🗣️ 求助語音卡片 (展開更多)</h3>
                        <div class="space-y-3">
                            ${phraseCards}
                        </div>
                    </div>
                </div>
            `;
        }

        // --- TTS 語音 ---
        function speak(text) {
            if (!window.speechSynthesis) return alert("瀏覽器不支援語音");
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'ja-JP'; u.rate = 0.85; u.pitch = 1.1;
            window.speechSynthesis.speak(u);
        }
    </script>
</body>
</html>
