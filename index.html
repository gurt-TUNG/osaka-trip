        const USJ_RIDES = [
            { name: "瑪利歐賽車", h: 107, area: "任天堂", type: "刺激", switch: true },
            { name: "耀西冒險", h: 86, area: "任天堂", type: "溫和", switch: false },

        // --- 舊資料升級與防呆工具函數 (加入 CRUD 必備屬性) ---
        function sanitizeExpenses(expensesList) {
            if (!Array.isArray(expensesList)) return [];
            expensesList.forEach(e => {
                if (e.twd === undefined) {
                    e.jpy = e.amount || 0;
                    e.twd = Math.round(e.jpy * EXCHANGE_RATE);
                    e.catId = e.catId || 'other';
                    e.formula = e.formula || String(e.jpy);
                    e.day = e.day || 1;
                }
                // CRUD 新增：確保每筆資料都有 updatedAt 時間戳記，與 deleted 軟刪除標籤
                if (!e.updatedAt) e.updatedAt = e.id; 
                if (e.deleted === undefined) e.deleted = false;
            });
            return expensesList;
        }

        function sanitizePacking(packingList) {
             if (!Array.isArray(packingList)) return [];
             packingList.forEach(p => {
                 if (!p.updatedAt) p.updatedAt = p.id || Date.now();
                 if (p.deleted === undefined) p.deleted = false;
             });
             return packingList;
        }

        if(!appState.packing) appState.packing = DEFAULT_STATE.packing;

        // ==========================================
        // ☁️ 專業雲端同步核心邏輯 (支援 CRUD 智慧合併)
        // ==========================================

        function showLoading(show, text="處理中...") {
            const overlay = document.getElementById('loading-overlay');
            document.getElementById('loading-text').innerText = text;
            overlay.style.display = show ? 'flex' : 'none';
        }

        async function cloudSync(isManual = true) {
            if(isManual) showLoading(true, "正在與雲端雙向同步中...");
            try {
                document.getElementById('sync-status').innerText = "☁️ 同步中...";
                await performSync();
                document.getElementById('sync-status').innerText = "已於 " + new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'}) + " 同步";
                if(isManual) {
                    showLoading(false);
                    alert("🎉 雲端雙向同步完成！\n資料已更新至最新狀態。");
                }
            } catch (e) {
                console.log("同步失敗:", e);
                document.getElementById('sync-status').innerText = "⚠️ 離線模式 (同步失敗)";
                if(isManual) {
                    showLoading(false);
                    alert("❌ 同步失敗，請檢查網路連線或 API 網址是否正確。");
                }
            }
            render();
        }

        async function performSync() {
            try {
                // 1. 抓取雲端資料
                const res = await fetch(API_URL);
                const result = await res.json();
                
                let cloudState = DEFAULT_STATE;
                if (result.status === "success" && result.data && result.data !== "{}") {
                    cloudState = JSON.parse(result.data);
                }

                let mergedState = { ...appState };
                
                // 2. 合併記帳 (以 ID 與 updatedAt 為準)
                if (cloudState.expenses) {
                    cloudState.expenses = sanitizeExpenses(cloudState.expenses);
                    
                    cloudState.expenses.forEach(cEx => {
                        const mExIndex = mergedState.expenses.findIndex(m => m.id === cEx.id);
                        if (mExIndex === -1) {
                            // 本地沒有，直接加入
                            mergedState.expenses.push(cEx);
                        } else {
                            // 本地有，比對 updatedAt，誰比較新就用誰的
                            const mEx = mergedState.expenses[mExIndex];
                            if (cEx.updatedAt > mEx.updatedAt) {
                                mergedState.expenses[mExIndex] = cEx; // 雲端比較新，覆蓋本地
                            }
                            // 如果本地比較新 (mEx.updatedAt > cEx.updatedAt)，就保留本地的，等一下會整包上傳
                        }
                    });
                    mergedState.expenses.sort((a, b) => b.id - a.id); // 依建立時間排序
                }

                // 3. 合併清單 (以 ID 與 updatedAt 為準)
                if (cloudState.packing) {
                    cloudState.packing = sanitizePacking(cloudState.packing);
                    cloudState.packing.forEach(cPk => {
                        const mPkIndex = mergedState.packing.findIndex(p => p.id === cPk.id);
                        if (mPkIndex === -1) {
                            mergedState.packing.push(cPk);
                        } else {
                            const mPk = mergedState.packing[mPkIndex];
                            if (cPk.updatedAt > mPk.updatedAt) {
                                mergedState.packing[mPkIndex] = cPk;
                            }
                        }
                    });
                }

                // 狀態合併 (簡單聯集)
                mergedState.completedSpots = { ...cloudState.completedSpots, ...mergedState.completedSpots };
                mergedState.hiddenDays = { ...cloudState.hiddenDays, ...mergedState.hiddenDays };

                if (cloudState.customSpots) {
                    Object.keys(cloudState.customSpots).forEach(day => {
                        if (!mergedState.customSpots[day]) mergedState.customSpots[day] = [];
                        cloudState.customSpots[day].forEach(cSpot => {
                            const exists = mergedState.customSpots[day].some(mSpot => mSpot.id === cSpot.id);
                            if (!exists) mergedState.customSpots[day].push(cSpot);
                        });
                    });
                }

                // 4. 儲存合併結果到本地
                appState = mergedState;
                saveState();

                // 5. 上傳合併後的最新資料回 Google Sheets
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ data: JSON.stringify(appState) })
                });

            } catch (err) {
                throw err;
            }
        }

        }

        // --- 記帳 CRUD 邏輯 ---
        function previewCalc() {
            const input = document.getElementById('ex-formula').value;
            const withPlus = input.replace(/\s+/g, '+'); 
            const safeInput = withPlus.replace(/[^0-9+\-*/().]/g, '');
            try {
                if(safeInput && !safeInput.endsWith('+') && !safeInput.endsWith('-')) {
                    const jpy = Math.floor(eval(safeInput));
                    const twd = Math.round(jpy * EXCHANGE_RATE);
                    document.getElementById('ex-preview').innerText = isNaN(twd) ? '' : `NT$ ${twd}`;
                } else { document.getElementById('ex-preview').innerText = ''; }
            } catch(e) { document.getElementById('ex-preview').innerText = ''; }
        }

        // 觸發編輯模式
        function editExpense(id) {
            editingExpenseId = id;
            render();
            document.getElementById('ex-desc').focus();
        }

        function cancelEdit() {
            editingExpenseId = null;
            render();
        }

        function saveExpense() {
            const day = parseInt(document.getElementById('ex-day').value);
            const catId = document.getElementById('ex-cat').value;
            const desc = document.getElementById('ex-desc').value.trim() || '未命名項目';
            const rawFormula = document.getElementById('ex-formula').value;
            const withPlus = rawFormula.replace(/\s+/g, '+');
            const formula = withPlus.replace(/[^0-9+\-*/().]/g, '');
            
            if(!formula) return alert("請輸入金額或算式！");
            
            try {
                const jpy = Math.floor(eval(formula));
                if(isNaN(jpy) || jpy <= 0) throw new Error();
                const twd = Math.round(jpy * EXCHANGE_RATE);
                
                if (editingExpenseId) {
                    // Update 修改
                    const index = appState.expenses.findIndex(e => e.id === editingExpenseId);
                    if (index !== -1) {
                        appState.expenses[index] = {
                            ...appState.expenses[index],
                            day, catId, desc, formula: rawFormula, jpy, twd,
                            updatedAt: Date.now() // 更新時間戳記，確保同步時能覆蓋舊資料
                        };
                    }
                    editingExpenseId = null;
                } else {
                    // Create 新增
                    const now = Date.now();
                    appState.expenses.unshift({
                        id: now, updatedAt: now, deleted: false,
                        day, catId, desc, formula: rawFormula, jpy, twd,
                        time: new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'})
                    });
                }
                
                render();
                cloudSync(false);
            } catch(e) {
                alert("算式錯誤，請檢查輸入！");
            }
        }

        function deleteExpense(id) { 
            // CRUD 刪除：軟刪除 (Soft Delete)，加上 updatedAt 讓雲端知道這筆被刪了
            const exp = appState.expenses.find(e => e.id === id);
            if (exp) {
                exp.deleted = true;
                exp.updatedAt = Date.now();
                render(); 
                cloudSync(false); 
            }
        }
        
        function downloadCSV() {
            const activeExpenses = appState.expenses.filter(e => !e.deleted);
            if(activeExpenses.length === 0) return alert("沒有資料可匯出！");
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF天數,分類,項目,日幣,台幣,時間\n";
            activeExpenses.forEach(e => { 
                const catName = EXPENSE_CATEGORIES.find(c=>c.id===e.catId)?.label || '其他';
                csvContent += `Day ${e.day},${catName},${e.desc},${e.jpy},${e.twd},${e.time}\n`; 
            });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a"); link.setAttribute("href", encodedUri); link.setAttribute("download", "大阪旅遊記帳.csv"); link.click();
        }

        function downloadJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(appState, null, 2));
            const dl = document.createElement('a'); dl.setAttribute("href", dataStr); dl.setAttribute("download", `大阪旅遊備份_${new Date().toISOString().slice(0,10)}.json`); dl.click();
        }

        function togglePacking(id) { 
            const item = appState.packing.find(p => p.id === id); 
            if (item) { item.checked = !item.checked; item.updatedAt = Date.now(); } 
            render(); cloudSync(false); 
        }
        function addPacking() { 
            const input = document.getElementById('new-pack-item'); 
            if(!input.value.trim()) return; 
            const now = Date.now();
            appState.packing.push({ id: now, text: input.value.trim(), checked: false, updatedAt: now, deleted: false }); 
            render(); cloudSync(false); 
        }

            const item = appState.packing.find(p => p.id === id);
            if (item) { item.deleted = true; item.updatedAt = Date.now(); }
            render(); cloudSync(false); 
        }

        // --- TTS 語音 ---
        function speak(text) {
            if (!window.speechSynthesis) return alert("瀏覽器不支援語音");
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'ja-JP'; u.rate = 0.85; u.pitch = 1.1;
            window.speechSynthesis.speak(u);
        }
    </script>
